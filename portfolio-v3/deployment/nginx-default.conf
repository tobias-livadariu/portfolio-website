# Drop-in replacement for /etc/nginx/sites-available/default.
#
# How to install:
#   sudo cp deployment/nginx-default.conf /etc/nginx/sites-available/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Differences from the original /etc/nginx/sites-available/default on the
# server, all minimal and reversible:
#
#   1. Removed the old `location /portfolio { ... }` block. The routing now
#      comes from /etc/nginx/snippets/portfolio.conf, installed and kept in
#      sync by deployment/deploy.sh. The snippet provides:
#        - exact /portfolio  → serves index.html (URL bar stays /portfolio)
#        - /portfolio/*      → assets + SPA fallback, immutable cache on
#                              /portfolio/assets/<hash>.*
#        - regex catch-all   → 301 to /portfolio for every URL that isn't
#                              /portfolio* or /lights-on*
#   2. Removed the old `location / { try_files $uri $uri/ =404; }` block.
#      Unmatched URLs now go to /portfolio (per the snippet's catch-all)
#      instead of returning a bare 404.
#   3. Removed the redundant second `server_name _;` line in both server
#      blocks (the explicit hostnames above them already cover matching;
#      `_` was an unmatchable placeholder doing nothing).
#
# Everything else — listens, SSL certs, the HTTP→HTTPS redirect block,
# the lights-on locations, the API proxy, and all `# managed by Certbot`
# markers — is unchanged so Certbot's renewal flow is unaffected.

# ---- HTTPS: tobias-livadariu.online (apex + www) ------------------------

server {
    server_name tobias-livadariu.online www.tobias-livadariu.online;

    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;

    # Portfolio routing (canonical /portfolio, /portfolio/* SPA + asset
    # cache, catch-all redirect). Edit deployment/nginx-portfolio.conf in
    # the repo to change these rules; deploy.sh syncs the installed copy.
    include /etc/nginx/snippets/portfolio.conf;

    # Lights On site — untouched by the portfolio snippet.
    location /lights-on {
        root /var/www/html;
        index index.html;
        try_files $uri /lights-on/index.html;
    }

    # Lights On API — longer prefix wins over /lights-on above.
    location /lights-on/api/ {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tobias-livadariu.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tobias-livadariu.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ---- HTTP: redirect to HTTPS (Certbot-managed) --------------------------

server {
    if ($host = www.tobias-livadariu.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = tobias-livadariu.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;

    server_name tobias-livadariu.online www.tobias-livadariu.online;

    return 404; # managed by Certbot
}
