# Portfolio site routing snippet.
#
# Installed by deployment/deploy.sh to /etc/nginx/snippets/portfolio.conf.
# To activate ONCE, add this line inside the server { } that serves
# tobias-livadariu.online (and the www. variant):
#
#     include /etc/nginx/snippets/portfolio.conf;
#
# The catch-all redirect below is a regex location whose lookahead
# exempts /portfolio(/...) and /lights-on(/...) from the redirect. So
# your /lights-on app keeps being served by whatever location blocks you
# already have for it — this snippet does not touch that path.

# Canonical entry: /portfolio (no trailing slash). Serve index.html
# directly via alias so the URL bar stays as /portfolio (no redirect to
# /portfolio/). Cache-Control on the shell stays no-cache; the hashed
# asset bundles under /portfolio/assets are cached aggressively below.
location = /portfolio {
    alias /var/www/html/portfolio/index.html;
    default_type text/html;
    add_header Cache-Control "no-cache" always;
}

# /portfolio/ and any sub-path: serve static files; fall back to
# index.html so deep links / refresh on client-side routes resolve.
location /portfolio/ {
    root /var/www/html;
    try_files $uri $uri/ /portfolio/index.html;
    add_header Cache-Control "no-cache" always;

    # Vite emits content-hashed filenames under /portfolio/assets — those
    # are safe to cache forever.
    # Some nginx mime.types tables do not include `.mjs`; pdf.js loads its
    # worker as a module and browsers reject module workers served as
    # application/octet-stream.
    location ~* ^/portfolio/assets/.*\.mjs$ {
        root /var/www/html;
        types {
            text/javascript mjs;
        }
        default_type text/javascript;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^/portfolio/assets/.*\.(?:js|css|woff2?|ttf|png|jpe?g|gif|svg|webp|ico)$ {
        root /var/www/html;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}

# Catch-all: redirect every other request to /portfolio EXCEPT the
# /portfolio and /lights-on prefixes, which fall through to the more
# specific location blocks (here for portfolio; in your existing config
# for lights-on). Regex locations are evaluated before prefix locations,
# so this match takes priority over a plain `location /` while still
# yielding to the exact `= /portfolio` above for that one URI.
location ~ ^/(?!portfolio(?:$|/)|lights-on(?:$|/)) {
    return 301 /portfolio;
}
